<!DOCTYPE html>
<html>

<head>
<title>PMP Mock Exam Simulator</title>

<style>

body{
font-family: Arial;
margin:40px;
}

h1{
margin-bottom:10px;
}

.simlink{
display:block;
margin:4px 0;
font-size:16px;
}

</style>
</head>

<body>

<h1>PMP Mock Exam Simulator</h1>

<p><b>Simulation Format</b></p>

<ul>
<li>60 Questions</li>
<li>70 Minutes</li>
<li>People / Process / Business Domains</li>
</ul>

<h2>PMP Simulations</h2>

<div id="simulations"></div>

<script>

let html=""

for(let i=1;i<=20;i++){

html+=`<a class="simlink" href="exam.html?exam=${i}">Simulation ${i}</a>`

}

document.getElementById("simulations").innerHTML=html

</script>

</body>
</html>
